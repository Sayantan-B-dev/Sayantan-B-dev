# File: .github/workflows/snake.yml
# Professional dark snake configuration

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate dark themed snake
        uses: Platane/snk@v3
        with:
          github_user_name: Sayantan-B-dev
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push snake animation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update dark snake animation"
          file_pattern: dist/github-contribution-grid-snake-dark.svg
